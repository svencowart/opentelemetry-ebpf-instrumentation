name: Privileged unit tests

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main", "release-*"]
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string

concurrency:
  group: pull-request-privileged-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-test-privileged:
    name: "Unit tests (privileged)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Generate and build tools
        run: make prereqs docker-generate

      - name: Run privileged unit tests
        run: sudo make test-privileged

      - name: Cleanup coverage data
        run: make cov-exclude-generated

      - name: Report coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./testoutput/cover.txt
          flags: unittests
          name: go-privileged-unittests-coverage
