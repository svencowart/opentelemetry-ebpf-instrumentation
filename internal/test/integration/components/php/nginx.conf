worker_processes 1;
events { worker_connections 1024; } #total number of connections nginx can handle concurrently

http {
    sendfile on;
#      fastcgi_read_timeout 4s; #kills the connection (http request) if php-fpm takes more than 1s to handle it (return a response)

    server {
        listen 80 default_server;
        root /var/www/html;
        server_name _;

        location / {
            fastcgi_pass php-fpm:9000;
            # fastcgi_pass unix:/run/php-fpm/www.sock
            fastcgi_index index.php;

            # Tracing / correlation headers (placed first so kprobes with small buffers see them)
            fastcgi_param HTTP_X_REQUEST_ID        $request_id;
            fastcgi_param HTTP_X_TRACE_ID          $request_id;
            fastcgi_param HTTP_X_SPAN_ID           $request_id;
            fastcgi_param HTTP_X_CORRELATION_ID    $request_id;
            fastcgi_param HTTP_X_B3_TRACEID        $request_id;
            fastcgi_param HTTP_X_B3_SPANID         $request_id;
            fastcgi_param HTTP_X_B3_SAMPLED        "1";

            # Request metadata headers
            fastcgi_param HTTP_X_FORWARDED_FOR     $proxy_add_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_HOST    $host;
            fastcgi_param HTTP_X_FORWARDED_PORT    $server_port;
            fastcgi_param HTTP_X_FORWARDED_PROTO   $scheme;
            fastcgi_param HTTP_X_REAL_IP           $remote_addr;

            # Timing headers
            fastcgi_param HTTP_X_REQUEST_START     "t=$msec";
            fastcgi_param HTTP_X_NGINX_TIMESTAMP   $time_iso8601;

            # Gateway / routing headers
            fastcgi_param HTTP_X_GATEWAY           "nginx";
            fastcgi_param HTTP_X_SERVICE_NAME      "php-fpm-app";
            fastcgi_param HTTP_X_ENVIRONMENT       "development";
            fastcgi_param HTTP_X_REGION            "local";

            # Custom debug headers
            fastcgi_param HTTP_X_NGINX_SERVER_NAME $server_name;
            fastcgi_param HTTP_X_NGINX_REQUEST_URI $request_uri;
            fastcgi_param HTTP_X_NGINX_SCHEME      $scheme;
            fastcgi_param HTTP_X_NGINX_WORKER_PID  $pid;

            # Standard FastCGI params (after custom ones)
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        location /status {
            access_log off;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_pass php-fpm:9000;
        }

        location /stub_status {
            stub_status on;
            access_log off;
        }
    }
}

